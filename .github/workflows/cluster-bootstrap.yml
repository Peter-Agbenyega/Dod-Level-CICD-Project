# =============================================================================
# EKS Cluster Bootstrap Pipeline
# Run this ONCE after provisioning a new EKS cluster, before the main
# deployment pipeline. Installs and verifies all cluster-level dependencies.
#
# Stages:
#   1. Scan cluster component images (Trivy) — gate before installing anything
#   2. Bootstrap cluster:
#        a. Grant Mainuser cluster-admin access
#        b. Install ingress-nginx (Helm)
#        c. Install ArgoCD
#        d. Register ArgoCD Application (argocd/application.yaml)
#        e. Verify all components are healthy
#
# Trigger: Manual (workflow_dispatch) — run once per cluster lifecycle
# =============================================================================

name: EKS Cluster Bootstrap

on:
  workflow_dispatch:
    inputs:
      cluster_name:
        description: "EKS cluster name"
        required: true
        default: "dod-ops-cluster"
      aws_region:
        description: "AWS region"
        required: true
        default: "us-east-2"

# id-token:write — exchange GitHub OIDC token for AWS credentials
permissions:
  id-token: write
  contents: read

env:
  # Pin exact versions — never pull moving tags in a security-conscious pipeline
  INGRESS_NGINX_VERSION: "4.12.0"           # Helm chart version
  INGRESS_NGINX_IMAGE: "registry.k8s.io/ingress-nginx/controller:v1.12.0"
  ARGOCD_VERSION: "v2.13.3"
  ARGOCD_IMAGE: "quay.io/argoproj/argocd:v2.13.3"

jobs:
  # ============================================================================
  # Stage 1: Scan cluster component images with Trivy before installing anything
  # This mirrors what Iron Bank does in a real DoD environment — no image is
  # deployed to the cluster without passing a vulnerability gate first.
  # ============================================================================
  scan-images:
    name: "1. Scan Cluster Component Images (Trivy)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Scan ingress-nginx controller image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.INGRESS_NGINX_IMAGE }}
          format: table
          output: trivy-ingress-nginx.txt
          exit-code: "1"
          severity: "HIGH,CRITICAL"
          ignore-unfixed: true

      - name: Scan ArgoCD image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.ARGOCD_IMAGE }}
          format: table
          output: trivy-argocd.txt
          exit-code: "1"
          severity: "HIGH,CRITICAL"
          ignore-unfixed: true

      - name: Upload image scan results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bootstrap-trivy-results
          path: |
            trivy-ingress-nginx.txt
            trivy-argocd.txt
          retention-days: 30

  # ============================================================================
  # Stage 2: Bootstrap the cluster
  # Runs only if both image scans pass. All install commands are idempotent
  # (helm upgrade --install, kubectl apply) — safe to re-run if interrupted.
  # ============================================================================
  bootstrap:
    name: "2. Bootstrap EKS Cluster"
    runs-on: ubuntu-latest
    needs: scan-images
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ github.event.inputs.aws_region }}

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig \
            --name ${{ github.event.inputs.cluster_name }} \
            --region ${{ github.event.inputs.aws_region }}
          kubectl get nodes

      # -------------------------------------------------------------------------
      # Grant the deploying IAM user cluster-admin access.
      # create-access-entry is idempotent — safe to re-run (exits 0 if exists).
      # -------------------------------------------------------------------------
      - name: Grant Mainuser cluster-admin access
        run: |
          PRINCIPAL="arn:aws:iam::${{ vars.AWS_ACCOUNT_ID || '450665609241' }}:user/Mainuser"
          CLUSTER="${{ github.event.inputs.cluster_name }}"
          REGION="${{ github.event.inputs.aws_region }}"

          # Create access entry (no-op if already exists)
          aws eks create-access-entry \
            --cluster-name "$CLUSTER" \
            --region "$REGION" \
            --principal-arn "$PRINCIPAL" \
            --type STANDARD 2>&1 | grep -v "already exists" || true

          # Associate cluster-admin policy
          aws eks associate-access-policy \
            --cluster-name "$CLUSTER" \
            --region "$REGION" \
            --principal-arn "$PRINCIPAL" \
            --policy-arn arn:aws:eks::aws:cluster-access-policy/AmazonEKSClusterAdminPolicy \
            --access-scope type=cluster 2>&1 | grep -v "already exists" || true

          echo "Mainuser cluster-admin access confirmed."

      # -------------------------------------------------------------------------
      # Install ingress-nginx using the pinned chart version
      # -------------------------------------------------------------------------
      - name: Install ingress-nginx
        run: |
          helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
          helm repo update

          helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx \
            --version ${{ env.INGRESS_NGINX_VERSION }} \
            --namespace ingress-nginx \
            --create-namespace \
            --set controller.image.tag=v1.12.0 \
            --wait \
            --timeout=5m

          echo "ingress-nginx installed."
          kubectl get pods -n ingress-nginx

      # -------------------------------------------------------------------------
      # Install ArgoCD using the pinned version manifest
      # The applicationsets CRD may log a "Too long" annotation warning —
      # this is a known cosmetic issue and does not affect ArgoCD functionality.
      # -------------------------------------------------------------------------
      - name: Install ArgoCD
        run: |
          kubectl create namespace argocd --dry-run=client -o yaml | kubectl apply -f -

          kubectl apply -n argocd \
            -f https://raw.githubusercontent.com/argoproj/argo-cd/${{ env.ARGOCD_VERSION }}/manifests/install.yaml

          echo "Waiting for ArgoCD server to become available..."
          kubectl wait --for=condition=available deployment \
            -l app.kubernetes.io/name=argocd-server \
            -n argocd \
            --timeout=120s

          echo "ArgoCD installed."
          kubectl get pods -n argocd

      # -------------------------------------------------------------------------
      # Register the application with ArgoCD.
      # kubectl apply is idempotent — safe to re-run.
      # -------------------------------------------------------------------------
      - name: Register ArgoCD Application
        run: |
          kubectl apply -f argocd/application.yaml
          echo "ArgoCD Application registered. ArgoCD will begin syncing shortly."

      # -------------------------------------------------------------------------
      # Verify all components are healthy before declaring bootstrap complete
      # -------------------------------------------------------------------------
      - name: Verify bootstrap
        run: |
          echo "=== Nodes ==="
          kubectl get nodes

          echo ""
          echo "=== ingress-nginx ==="
          kubectl get pods -n ingress-nginx
          kubectl get svc ingress-nginx-controller -n ingress-nginx

          echo ""
          echo "=== ArgoCD ==="
          kubectl get pods -n argocd

          echo ""
          echo "=== ArgoCD Application ==="
          kubectl get application dod-ops-dashboard -n argocd

          echo ""
          echo "============================================"
          echo "  Cluster bootstrap complete."
          echo "  Push to main to trigger app deployment."
          echo "============================================"
